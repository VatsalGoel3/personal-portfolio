<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic Queue Adaptation project image</title>
  <desc id="desc">Offline recommendation reranking pipeline with baseline queue, manual intent signal, and adaptive output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="48%" stop-color="#18233a"/>
      <stop offset="100%" stop-color="#0b3b34"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g opacity=".16" stroke="#cbd5e1">
    <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M0 600h1200"/>
    <path d="M120 0v720M240 0v720M360 0v720M480 0v720M600 0v720M720 0v720M840 0v720M960 0v720M1080 0v720"/>
  </g>
  <g fill="#e2e8f0" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="80" y="110" font-size="46" font-weight="800">Dynamic Queue Adaptation</text>
    <text x="82" y="158" font-size="24" fill="#cbd5e1">Intent-aware reranking • offline evaluation • reproducible artifacts</text>
  </g>
  <g transform="translate(92 250)">
    <rect width="260" height="300" rx="20" fill="#0f172a" stroke="#334155"/>
    <text x="36" y="58" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">seed queue</text>
    <rect x="36" y="104" width="188" height="24" rx="8" fill="#64748b"/>
    <rect x="36" y="150" width="158" height="24" rx="8" fill="#64748b"/>
    <rect x="36" y="196" width="202" height="24" rx="8" fill="#64748b"/>
  </g>
  <g transform="translate(470 220)">
    <rect width="260" height="360" rx="20" fill="#0b1220" stroke="#22c55e" stroke-width="4"/>
    <text x="32" y="64" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">intent signal</text>
    <circle cx="70" cy="128" r="28" fill="#22c55e"/>
    <circle cx="132" cy="178" r="28" fill="#38bdf8"/>
    <circle cx="190" cy="236" r="28" fill="#f59e0b"/>
    <path d="M70 128c38 18 58 32 62 50 38 18 56 34 58 58" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <text x="38" y="316" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">3/4 scenarios +</text>
  </g>
  <g transform="translate(850 250)">
    <rect width="260" height="300" rx="20" fill="#0f172a" stroke="#334155"/>
    <text x="36" y="58" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">reranked</text>
    <rect x="36" y="104" width="202" height="24" rx="8" fill="#22c55e"/>
    <rect x="36" y="150" width="174" height="24" rx="8" fill="#38bdf8"/>
    <rect x="36" y="196" width="138" height="24" rx="8" fill="#64748b"/>
  </g>
  <path d="M352 400h118M730 400h120" stroke="url(#line)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
</svg>
