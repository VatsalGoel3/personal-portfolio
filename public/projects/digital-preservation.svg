<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Digital preservation automation</title>
  <desc id="desc">Validation workflow for archival records with automated schema checks.</desc>
